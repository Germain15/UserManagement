spring:
  datasource:
    # Docker injectera SPRING_DATASOURCE_URL. Sinon, on utilise H2 par défaut.
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  
  jpa:
    # On laisse Hibernate choisir le bon Dialecte automatiquement selon la DB connectée
    hibernate:
      ddl-auto: update
    show-sql: true # débugger les requêtes dans les logs
  
  h2:
    console:
      enabled: true
      path: /h2-console

  jackson:
    serialization:
      indent_output: true

# Configuration Actuator pour le Healthcheck Docker
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always