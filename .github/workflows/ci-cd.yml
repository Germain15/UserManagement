name: CI/CD Pipeline User Management

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1 : TESTS (Validation du code)
  tests:
    name:  Run Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: userDb
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Tests with Maven
        run: mvn clean test
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/userDb
          SPRING_DATASOURCE_USERNAME: appuser
          SPRING_DATASOURCE_PASSWORD: password
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
          SPRING_JPA_HIBERNATE_DDL_AUTO: update

  
  # JOB 2 : BUILD & PUSH
  
  build-and-push:
    name:  Build and Push Docker Image
    needs: tests
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/user-management-api
          tags: |
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  
  # JOB 3 : DEPLOY STAGING (Simulation sur Push Main)
  
  deploy-staging:
    name:  Deploy to Staging
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name:  Preparation
        run: echo "Connecting to Staging VPS via SSH..."

      - name:  Update Environment
        run: |
          echo "Pulling latest image: ${{ secrets.DOCKER_USERNAME }}/user-management-api:latest"
          echo "Executing: docker compose up -d --build"
          echo "Deployment successful on http://staging-api.local"

  
  # JOB 4 : DEPLOY PRODUCTION (Simulation sur Tag uniquement)
  
  deploy-production:
    name: Deploy to Production
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name:  Pre-deploy Check (Rollback Safety)
        run: |
          echo "Backing up current database state before production release..."
          echo "Verifying service health..."

      - name: Production Release
        run: |
          echo "Deploying official release ${{ github.ref_name }}..."
          echo "SSH Action: docker pull ${{ secrets.DOCKER_USERNAME }}/user-management-api:${{ github.ref_name }}"
          echo "SSH Action: docker compose up -d"
          
      - name:  Post-deploy Health Check
        run: echo "Monitoring traffic... Production is stable."